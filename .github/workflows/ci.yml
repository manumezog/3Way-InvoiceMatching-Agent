name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build needs a real key to satisfy env validation at import time.
          # Set this secret in GitHub → Settings → Secrets → Actions.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Neon DB for build (optional — build doesn't run queries)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
